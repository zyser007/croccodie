<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Mobile-first viewport. Disable pinch/double-tap zoom for a toy-like feel. -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#2fae5a" />
  <title>Crocodile Tooth Trap</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game">
    <!-- Top heads-up display: score + title + best streak -->
    <header class="hud">
      <div class="hud-box">
        <span class="hud-label">Pressed</span>
        <span class="hud-value" id="score">0</span>
      </div>
      <h1 class="title">Croc Tooth Trap</h1>
      <div class="hud-box">
        <span class="hud-label">Best</span>
        <span class="hud-value" id="best">0</span>
      </div>
    </header>

    <!-- Stage holds the crocodile + status message -->
    <section class="stage">
      <div class="croc" id="croc">
        <!-- Eyes bulge above the snout -->
        <div class="eyes">
          <div class="eye"><div class="pupil"></div></div>
          <div class="eye"><div class="pupil"></div></div>
        </div>

        <!-- The head / jaws. Red interior is the open mouth. -->
        <div class="jaws">
          <!-- Upper jaw drops down to "bite" on game over -->
          <div class="upper-jaw" id="upperJaw">
            <div class="nostrils"><span></span><span></span></div>
            <div class="teeth-row upper-teeth" id="upperTeeth"></div>
          </div>

          <!-- Lower jaw holds the clickable teeth -->
          <div class="lower-jaw">
            <div class="teeth-row lower-teeth" id="lowerTeeth"></div>
          </div>
        </div>
      </div>

      <p class="message" id="message">Tap the teeth&hellip; one is a trap!</p>
    </section>

    <!-- Replay -->
    <button class="replay" id="replay" type="button">Play Again</button>
  </main>

  <script src="game.js"></script>
</body>
</html>
