<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Mobile-first viewport. Disable pinch/double-tap zoom for a toy-like feel. -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#3a551f" />
  <title>Crocodile Tooth Trap</title>
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>
  <main class="game">
    <!-- Top heads-up display: score + title + best streak -->
    <header class="hud">
      <div class="hud-box">
        <span class="hud-label">Pressed</span>
        <span class="hud-value" id="score">0</span>
      </div>
      <h1 class="title">Croc Tooth Trap</h1>
      <div class="hud-box">
        <span class="hud-label">Best</span>
        <span class="hud-value" id="best">0</span>
      </div>
    </header>

    <!-- Stage holds the crocodile + status message -->
    <section class="stage">
      <!-- #croc wrapper carries the .biting shake class -->
      <div class="croc" id="croc">
        <svg
          class="croc-svg"
          viewBox="0 0 400 392"
          xmlns="http://www.w3.org/2000/svg"
          role="img"
          aria-label="Crocodile with its mouth open"
        >
          <defs>
            <!-- Muted, lifelike skin -->
            <linearGradient id="skinUpper" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#869a55" />
              <stop offset="0.5" stop-color="#5f7a36" />
              <stop offset="1" stop-color="#445a26" />
            </linearGradient>
            <linearGradient id="skinLower" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#4d6628" />
              <stop offset="0.6" stop-color="#6a8642" />
              <stop offset="1" stop-color="#869766" />
            </linearGradient>
            <!-- Dark wet throat -->
            <radialGradient id="mouthGrad" cx="0.5" cy="0.35" r="0.75">
              <stop offset="0" stop-color="#7a1c1c" />
              <stop offset="0.6" stop-color="#4a0f0f" />
              <stop offset="1" stop-color="#240606" />
            </radialGradient>
            <!-- Bone-coloured teeth -->
            <linearGradient id="toothGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#fbf8ec" />
              <stop offset="1" stop-color="#cfc8ad" />
            </linearGradient>
            <!-- Reptilian eye -->
            <radialGradient id="eyeGrad" cx="0.5" cy="0.4" r="0.7">
              <stop offset="0" stop-color="#f0e08a" />
              <stop offset="0.7" stop-color="#cda93b" />
              <stop offset="1" stop-color="#9c7d22" />
            </radialGradient>
            <!-- Trap tooth highlight (revealed on game over) -->
            <linearGradient id="trapGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#ffd24d" />
              <stop offset="1" stop-color="#f08a1c" />
            </linearGradient>
            <!-- Soft drop shadow under the head -->
            <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#10250f" flood-opacity="0.35" />
            </filter>
          </defs>

          <!-- ===== Mouth interior (back layer) ===== -->
          <g id="mouth">
            <path
              d="M 70 150 C 110 162, 290 162, 330 150
                 L 330 234 C 290 222, 110 222, 70 234 Z"
              fill="url(#mouthGrad)"
            />
            <!-- Tongue -->
            <ellipse cx="200" cy="214" rx="78" ry="17" fill="#a32f2f" />
            <ellipse cx="200" cy="211" rx="60" ry="10" fill="#bf4444" opacity="0.7" />
          </g>

          <!-- ===== Lower jaw (gum + clickable teeth) ===== -->
          <g id="lowerJaw" filter="url(#softShadow)">
            <path
              d="M 70 232 C 56 304, 116 380, 200 380
                 C 284 380, 344 304, 330 232
                 C 290 246, 110 246, 70 232 Z"
              fill="url(#skinLower)"
            />
            <!-- belly / scute texture -->
            <ellipse cx="200" cy="330" rx="92" ry="44" fill="#9aa97a" opacity="0.25" />
            <path d="M 120 300 q 80 26 160 0" stroke="#3c5020" stroke-width="3" fill="none" opacity="0.3" />
            <path d="M 132 330 q 68 22 136 0" stroke="#3c5020" stroke-width="3" fill="none" opacity="0.25" />
            <!-- darker gum line under the teeth -->
            <path
              d="M 70 232 C 110 246, 290 246, 330 232 L 330 244 C 290 258, 110 258, 70 244 Z"
              fill="#324518" opacity="0.55"
            />
            <!-- JS fills clickable lower fangs here -->
            <g id="lowerTeeth"></g>
          </g>

          <!-- ===== Upper jaw / snout (front layer, drops on bite) ===== -->
          <g id="upperJaw" filter="url(#softShadow)">
            <!-- Snout silhouette -->
            <path
              d="M 60 150 C 30 120, 30 58, 92 34
                 C 142 14, 258 14, 308 34
                 C 370 58, 370 120, 340 150
                 C 300 164, 100 164, 60 150 Z"
              fill="url(#skinUpper)"
            />

            <!-- scale / scute texture rows -->
            <g opacity="0.32" fill="#37491d">
              <ellipse cx="120" cy="92" rx="13" ry="8" />
              <ellipse cx="160" cy="84" rx="13" ry="8" />
              <ellipse cx="200" cy="80" rx="14" ry="8" />
              <ellipse cx="240" cy="84" rx="13" ry="8" />
              <ellipse cx="280" cy="92" rx="13" ry="8" />
              <ellipse cx="142" cy="118" rx="12" ry="7" />
              <ellipse cx="200" cy="114" rx="13" ry="7" />
              <ellipse cx="258" cy="118" rx="12" ry="7" />
            </g>

            <!-- Nostrils on the snout tip -->
            <g>
              <ellipse cx="183" cy="40" rx="13" ry="10" fill="#516b2c" />
              <ellipse cx="217" cy="40" rx="13" ry="10" fill="#516b2c" />
              <ellipse cx="183" cy="40" rx="5" ry="7" fill="#1d2a0f" />
              <ellipse cx="217" cy="40" rx="5" ry="7" fill="#1d2a0f" />
            </g>

            <!-- Eyes: raised mounds with vertical slit pupils -->
            <g class="eye">
              <ellipse cx="118" cy="46" rx="36" ry="33" fill="#5f7a36" />
              <ellipse cx="118" cy="44" rx="24" ry="26" fill="url(#eyeGrad)" />
              <ellipse cx="118" cy="44" rx="6" ry="19" fill="#10150a" />
              <circle cx="110" cy="34" r="5" fill="#ffffff" opacity="0.8" />
            </g>
            <g class="eye">
              <ellipse cx="282" cy="46" rx="36" ry="33" fill="#5f7a36" />
              <ellipse cx="282" cy="44" rx="24" ry="26" fill="url(#eyeGrad)" />
              <ellipse cx="282" cy="44" rx="6" ry="19" fill="#10150a" />
              <circle cx="274" cy="34" r="5" fill="#ffffff" opacity="0.8" />
            </g>

            <!-- darker upper gum the fangs grow from -->
            <path
              d="M 60 150 C 100 164, 300 164, 340 150 L 340 138 C 300 152, 100 152, 60 138 Z"
              fill="#324518" opacity="0.55"
            />
            <!-- JS fills decorative upper fangs here -->
            <g id="upperTeeth"></g>
          </g>
        </svg>
      </div>

      <p class="message" id="message">Tap the teeth&hellip; one is a trap!</p>
    </section>

    <!-- Replay -->
    <button class="replay" id="replay" type="button">Play Again</button>
  </main>

  <script src="game.js?v=2"></script>
</body>
</html>
